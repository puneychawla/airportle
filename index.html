#board { display: flex; flex-direction: column; gap: 5px; margin: 12px 0 14px; }
.row { display: flex; gap: 5px; }
.tile { width: 62px; height: 62px; border: 2px solid #d3d6da; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; text-transform: uppercase; color: #1a1a1b; background: #ffffff; user-select: none; }
@media (max-width: 400px) { .tile { width: 52px; height: 52px; font-size: 26px; } }
.tile.filled { border-color: #878a8c; animation: tpop .1s ease; }

.tile.f0 { animation: flip .5s ease forwards; }
.tile.f1 { animation: flip .5s .15s ease forwards; }

var EXTRA_VALID = ["AAL","AAR","ABJ","ABQ","ABV","ABZ","ACC","ACE","ADB","ADE","ADL","AEP","AES","AGP","AGR","AJA","AKL","ALA","ALB","ALC","ALG","ANK","ANU","AOJ","APW","AQJ","ARH","ASB","ASU","ATQ","AUA","AUS","AXA","BAH","BAK","BAQ","BBU","BBI","BEG","BEY","BFS","BGI","BGO","BGR","BHX","BIA","BIO","BJL","BJM","BKI","BLL","BLQ","BNE","BOD","BOJ","BON","BRE","BRN","BRS","BSB","BSL","BTS","BUE","BUF","CAL","CAN","CAS","CBR","CCJ","CFU","CGH","CGN","CHC","CHQ","CJU","CKG","CLJ","CMB","CMF","CNF","CNX","COK","CRK","CTA","CTG","CTU","CUN","CUR","CUZ","CVG","CWB","DAC","DAL","DAM","DAR","DCF","DKR","DLA","DME","DNK","DPS","DRS","DUS","EBB","EBL","EDI","EIN","EMA","ESB","EVN","FAO","FBU","FIH","FLR","FNA","FNC","FUE","FUK","GBE","GDL","GDN","GEO","GGT","GLA","GOA","GOH","GOT","GRX","GRZ","GUA","GUM","GVA","GYD","GYE","HAJ","HAM","HAV","HBA","HER","HIR","HKT","HOG","HRE","HRK","HSG","IBZ","IEV","IKA","IKT","INN","IOM","ISB","ITO","JAI","JAX","JIB","JNX","JRO","KAN","KBP","KGL","KHH","KHI","KIN","KIX","KJA","KLU","KMG","KRT","KTM","KZN","LAD","LBA","LCA","LCY","LED","LFW","LHE","LJU","LLW","LNZ","LPA","LPB","LUN","LUX","LYS","MAH","MAN","MCT","MDE","MHQ","MKE","MLA","MLE","MMX","MPM","MRS","MRU","MSQ","NAP","NAS","NCE","NIM","NKC","NOU","OAK","ODS","OPO","ORK","ORN","OSA","OTP","OUA","PAP","PBH","PDL","PER","PFO","PHC","PIK","PKX","PLZ","PNH","PNQ","POA","POM","POS","POZ","PPT","PTY","PUJ","PUS","PVR","RAK","RBA","REC","REU","RGN","RIX","RKV","RNO","ROB","ROC","RTM","RUN","SAL","SAP","SAT","SAW","SDJ","SDQ","SDR","SEZ","SHA","SHE","SJC","SJJ","SJO","SJU","SKB","SKG","SKP","SLL","SNA","SOF","SSA","STN","STR","SUB","SVG","SVQ","SXF","SXM","SZX","TAB","TAS","TBS","TER","TGD","TGU","TIA","TIP","TLN","TLS","TMP","TNR","TOS","TPE","TRD","TRN","TRV","TSE","TUN","TXL","UAH","UIO","ULN","URC","VAR","VCE","VKO","VLC","VLI","VNO","VPS","VTE","WLG","WRO","XIY","XMN","YEG","YHZ","YOW","YQB","YWG","YYC","YYJ","ZAG","ZNZ"];

var VALID = new Set(ANSWERS.map(function(a){return a[0];}));
EXTRA_VALID.forEach(function(c){VALID.add(c);});

var KB_ROWS=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']];
var answer,answerInfo,curRow,curCol,tiles,keyEls,keyState,over;
var stats={played:0,won:0,streak:0};

function getDayIndex(){var now=new Date(),m=new Date(now.getFullYear(),now.getMonth(),now.getDate(),0,0,0,0),e=new Date(2024,0,1);return Math.floor((m-e)/86400000);}
function getSecsUntilMidnight(){var now=new Date(),n=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,0,0,0,0);return Math.floor((n-now)/1000);}
function fmt(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}

function pickAnswer(){var idx=getDayIndex()%ANSWERS.length;answerInfo=ANSWERS[idx];answer=answerInfo[0];}

function buildBoard(){var b=document.getElementById('board');b.innerHTML='';tiles=[];for(var r=0;r<6;r++){var row=document.createElement('div');row.className='row';var ts=[];for(var c=0;c<3;c++){var t=document.createElement('div');t.className='tile';row.appendChild(t);ts.push(t);}b.appendChild(row);tiles.push(ts);}}

function buildKeyboard(){keyEls={};keyState={};KB_ROWS.forEach(function(row,i){var r=document.getElementById('kr'+i);r.innerHTML='';row.forEach(function(k){var btn=document.createElement('button');btn.className='k'+(k.length>1?' wide':'');btn.textContent=k;btn.setAttribute('type','button');btn.addEventListener('click',function(){handleKey(k);});r.appendChild(btn);keyEls[k]=btn;});});}

function startGame(){curRow=0;curCol=0;over=false;document.getElementById('ep').classList.remove('show');var t=document.getElementById('toast');t.classList.remove('show');t.textContent='';pickAnswer();buildBoard();buildKeyboard();}

function handleKey(k){if(over)return;if(k==='⌫'||k==='BACKSPACE'){if(curCol>0){curCol--;tiles[curRow][curCol].textContent='';tiles[curRow][curCol].classList.remove('filled');}}else if(k==='ENTER'){submitGuess();}else if(/^[A-Z]$/.test(k)&&curCol<3){tiles[curRow][curCol].textContent=k;tiles[curRow][curCol].classList.add('filled');curCol++;}}

function submitGuess(){if(curCol<3){shakeRow();showToast('Not enough letters');return;}var guess=tiles[curRow].map(function(t){return t.textContent;}).join('');if(!VALID.has(guess)){shakeRow();showToast('Not a valid IATA code');return;}var result=scoreGuess(guess);revealRow(result,guess);}

function scoreGuess(guess){var result=['absent','absent','absent'],a=answer.split(''),g=guess.split(''),used=[false,false,false];for(var i=0;i<3;i++){if(g[i]===a[i]){result[i]='correct';used[i]=true;}}for(var i=0;i<3;i++){if(result[i]==='correct')continue;for(var j=0;j<3;j++){if(!used[j]&&g[i]===a[j]){result[i]='present';used[j]=true;break;}}}return result;}

function revealRow(result,guess){var ts=tiles[curRow];ts.forEach(function(t,i){t.classList.remove('filled');t.classList.add('f'+i);setTimeout(function(){t.className='tile '+result[i];},150+i*150);});var row=curRow;setTimeout(function(){updateKeyboard(guess,result);var won=result.every(function(r){return r==='correct';});if(won){ts.forEach(function(t,i){setTimeout(function(){t.classList.add('bnc');},400+i*100);});setTimeout(function(){endGame(true,row);},1300);}else if(row===5){setTimeout(function(){endGame(false,row);},700);}else{curRow++;curCol=0;}},650);}

function updateKeyboard(guess,result){var pri={correct:3,present:2,absent:1};for(var i=0;i<3;i++){var k=guess[i];if((pri[result[i]]||0)>(pri[keyState[k]]||0)){keyState[k]=result[i];var el=keyEls[k];if(el){el.classList.remove('sc','sp','sa');el.classList.add(result[i]==='correct'?'sc':result[i]==='present'?'sp':'sa');}}}}

function endGame(won,row){
  over=true;stats.played++;
  if(won){stats.won++;stats.streak++;}else{stats.streak=0;}
  document.getElementById('er').textContent=won?['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'][row]:'Better luck next time!';
  document.getElementById('ec').textContent=answer;
  document.getElementById('ea').textContent=answerInfo[1]+' — '+answerInfo[2];
  var wp=stats.played?Math.round(stats.won/stats.played*100):0;
  document.getElementById('sr').innerHTML='<div class="stat"><div class="stn">'+stats.played+'</div><div class="stl">Played</div></div><div class="stat"><div class="stn">'+wp+'</div><div class="stl">Win %</div></div><div class="stat"><div class="stn">'+stats.streak+'</div><div class="stl">Streak</div></div>';
  var secs=getSecsUntilMidnight();
  document.getElementById('nl').textContent='Next code in: '+fmt(secs);
  var iv=setInterval(function(){var s=getSecsUntilMidnight();var el=document.getElementById('nl');if(el)el.textContent='Next code in: '+fmt(s);else clearInterval(iv);},1000);
  document.getElementById('ep').classList.add('show');
  loadImage(answerInfo[2],answerInfo[1]);
}

// Wikipedia REST API: fetch the page summary thumbnail for the city
function loadImage(city,airportName){
  var il=document.getElementById('il'),ci=document.getElementById('ci'),ic=document.getElementById('ic');
  il.textContent='Loading image...';
  il.classList.add('show');
  ci.classList.remove('show');
  ic.textContent='';

  // Try Wikipedia page summary — gives the lead image for that city's article
  var wikiTitle=encodeURIComponent(city.replace(/ /g,'_'));
  var url='https://en.wikipedia.org/api/rest_v1/page/summary/'+wikiTitle;

  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.thumbnail && data.thumbnail.source){
        // Upscale thumbnail: replace width in URL with 640
        var src=data.thumbnail.source.replace(/\/\d+px-/,'/640px-');
        ci.onload=function(){il.classList.remove('show');ci.classList.add('show');ic.textContent=city+' · '+airportName;};
        ci.onerror=function(){tryFallback(city,airportName);};
        ci.src=src;
      } else {
        tryFallback(city,airportName);
      }
    })
    .catch(function(){tryFallback(city,airportName);});
}

// Fallback: try a disambiguation like "City skyline" Wikipedia article
function tryFallback(city,airportName){
  var il=document.getElementById('il'),ci=document.getElementById('ci'),ic=document.getElementById('ic');
  var variants=[city+' skyline',city+' city',city.split(' ')[0]];
  var idx=0;
  function tryNext(){
    if(idx>=variants.length){finalFallback(city,airportName);return;}
    var wikiTitle=encodeURIComponent(variants[idx].replace(/ /g,'_'));
    idx++;
    fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+wikiTitle)
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.thumbnail&&data.thumbnail.source){
          var src=data.thumbnail.source.replace(/\/\d+px-/,'/640px-');
          ci.onload=function(){il.classList.remove('show');ci.classList.add('show');ic.textContent=city+' · '+airportName;};
          ci.onerror=function(){tryNext();};
          ci.src=src;
        } else { tryNext(); }
      })
      .catch(function(){tryNext();});
  }
  tryNext();
}

// Last resort: Wikimedia Commons search
function finalFallback(city,airportName){
  var il=document.getElementById('il'),ci=document.getElementById('ci'),ic=document.getElementById('ic');
  var api='https://en.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(city)+'&prop=pageimages&format=json&pithumbsize=640&origin=*';
  fetch(api)
    .then(function(r){return r.json();})
    .then(function(data){
      var pages=data.query&&data.query.pages;
      if(pages){
        var page=Object.values(pages)[0];
        if(page&&page.thumbnail&&page.thumbnail.source){
          ci.onload=function(){il.classList.remove('show');ci.classList.add('show');ic.textContent=city+' · '+airportName;};
          ci.onerror=function(){il.textContent='No image found for '+city;};
          ci.src=page.thumbnail.source;
          return;
        }
      }
      il.textContent='No image found for '+city;
    })
    .catch(function(){il.textContent='Could not load image.';});
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._tmr);t._tmr=setTimeout(function(){t.classList.remove('show');},1800);}
function shakeRow(){tiles[curRow].forEach(function(t){t.classList.remove('shake');void t.offsetWidth;t.classList.add('shake');});}

document.addEventListener('keydown',function(e){if(e.ctrlKey||e.metaKey||e.altKey)return;var k=e.key.toUpperCase();if(k==='BACKSPACE')handleKey('BACKSPACE');else if(k==='ENTER')handleKey('ENTER');else if(/^[A-Z]$/.test(k))handleKey(k);});
document.getElementById('ng').addEventListener('click',startGame);
startGame();
</script>
