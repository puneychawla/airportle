
<style>

#ic { font-size: clamp(10px, 2.5vw, 12px); color: #787c7e; text-align: center; }

.ep-btn {
  border: none; border-radius: 4px;

  cursor: pointer; text-transform: uppercase; -webkit-tap-highlight-color: transparent;
}
#ng { background: #6aaa64; color: #ffffff; }
#ng:hover { background: #538d4e; }
#pg { background: #ffffff; color: #1a1a1b; border: 2px solid #1a1a1b !important; }
#pg:hover { background: #f6f6f7; }

#toast {
  font-size: clamp(12px, 3vw, 14px); font-weight: 700; background: #1a1a1b; color: #ffffff;
  border-radius: 4px; padding: 8px 16px; margin: 8px 0 0; letter-spacing: 0.5px;
  opacity: 0; transition: opacity 0.25s; min-height: 34px; text-align: center; width: 92%;
}
#toast.show { opacity: 1; }

#board { display: flex; flex-direction: column; gap: clamp(4px, 1.2vw, 6px); margin: clamp(10px, 3vw, 14px) 0; }
.row { display: flex; gap: clamp(4px, 1.2vw, 6px); }
.tile {
  width: clamp(68px, 18vw, 80px);
  height: clamp(68px, 18vw, 80px);
  border: 2px solid #d3d6da;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(28px, 8vw, 38px); font-weight: 700; text-transform: uppercase;
  color: #1a1a1b; background: #ffffff; user-select: none;
}
.tile.filled { border-color: #878a8c; animation: tpop .1s ease; }
@keyframes tpop { 50% { transform: scale(1.1); } }
.tile.f0 { animation: flip .5s ease forwards; }
.tile.f1 { animation: flip .5s .15s ease forwards; }
.tile.f2 { animation: flip .5s .3s ease forwards; }
@keyframes flip {
  0%   { transform: rotateX(0deg); }
  49%  { transform: rotateX(-90deg); background:#fff; border-color:#878a8c; color:#1a1a1b; }
  50%  { transform: rotateX(-90deg); }
  100% { transform: rotateX(0deg); }
}
.tile.correct { background: #6aaa64; border-color: #6aaa64; color: #ffffff; }
.tile.present { background: #c9b458; border-color: #c9b458; color: #ffffff; }
.tile.absent  { background: #787c7e; border-color: #787c7e; color: #ffffff; }
.tile.shake { animation: shake .5s ease; }
@keyframes shake { 10%,30%,50%,70%,90% { transform: translateX(-5px); } 20%,40%,60%,80% { transform: translateX(5px); } }
.tile.bnc { animation: bnc .6s ease; }
@keyframes bnc { 40%{transform:translateY(-20px)} 60%{transform:translateY(-10px)} 80%{transform:translateY(-5px)} 100%{transform:translateY(0)} }

#kb {
  display: flex; flex-direction: column;
  gap: clamp(6px, 1.5vw, 9px);
  width: 100%; padding: clamp(6px, 2vw, 10px) clamp(4px, 1.5vw, 8px) clamp(14px, 4vw, 20px);
}
.kr { display: flex; justify-content: center; gap: clamp(4px, 1vw, 6px); }
.k {
  height: clamp(50px, 13vw, 62px);
  flex: 1;
  max-width: clamp(34px, 9vw, 46px);
  min-width: 0;
  border-radius: 4px; border: none; cursor: pointer;
  font-family: 'Clear Sans','Helvetica Neue',Arial,sans-serif;
  font-size: clamp(12px, 3vw, 15px); font-weight: 700; text-transform: uppercase;
  display: flex; align-items: center; justify-content: center;
  user-select: none; -webkit-tap-highlight-color: transparent;
  background-color: #d3d6da; color: #1a1a1b;
  touch-action: manipulation;
}
.k.wide { max-width: clamp(50px, 13vw, 68px); flex: 1.5; font-size: clamp(10px, 2.5vw, 12px); }
.k:active { opacity: 0.7; transform: scale(0.96); }
.k.sc { background-color: #6aaa64 !important; color: #ffffff !important; }
.k.sp { background-color: #c9b458 !important; color: #ffffff !important; }
.k.sa { background-color: #787c7e !important; color: #ffffff !important; }
</style>

<div id="gw">
  <div id="hdr">

</div>

<script>
var ANSWERS=[
  ["ATL","Hartsfield-Jackson Atlanta Intl","Atlanta"],["DFW","Dallas/Fort Worth Intl","Dallas"],
  ["DEN","Denver Intl","Denver"],["ORD","O'Hare Intl","Chicago"],["LAX","Los Angeles Intl","Los Angeles"],

  ["BOG","El Dorado Intl","Bogota"],["LIM","Jorge Chavez Intl","Lima"],
  ["SCL","Arturo Merino Benitez Intl","Santiago"],["EZE","Ezeiza Intl","Buenos Aires"],
  ["LHR","London Heathrow","London"],["LGW","London Gatwick","London"],
  ["CDG","Charles de Gaulle Intl","Paris"],["ORY","Paris Orly","Paris"],
  ["AMS","Amsterdam Schiphol","Amsterdam"],["FRA","Frankfurt Airport","Frankfurt"],
  ["MUC","Munich Airport","Munich"],["MAD","Madrid Barajas","Madrid"],
  ["BCN","Barcelona El Prat","Barcelona"],["FCO","Rome Fiumicino","Rome"],
  ["MXP","Milan Malpensa","Milan"],["ZRH","Zurich Airport","Zurich"],
  ["VIE","Vienna Intl","Vienna"],["BRU","Brussels Airport","Brussels"],
  ["CPH","Copenhagen Airport","Copenhagen"],["ARN","Stockholm Arlanda","Stockholm"],
  ["OSL","Oslo Gardermoen","Oslo"],["HEL","Helsinki Vantaa","Helsinki"],
  ["DUB","Dublin Airport","Dublin"],["LIS","Lisbon Humberto Delgado","Lisbon"],
  ["ATH","Athens Intl","Athens"],["WAW","Warsaw Chopin","Warsaw"],
  ["PRG","Vaclav Havel Airport","Prague"],["BUD","Budapest Ferenc Liszt Intl","Budapest"],
  ["IST","Istanbul Airport","Istanbul"],["SVO","Sheremetyevo Intl","Moscow"],
  ["TLV","Ben Gurion Intl","Tel Aviv"],["DXB","Dubai Intl","Dubai"],
  ["AUH","Abu Dhabi Intl","Abu Dhabi"],["DOH","Hamad Intl","Doha"],
  ["KWI","Kuwait Intl","Kuwait City"],["RUH","King Khalid Intl","Riyadh"],
  ["JED","King Abdulaziz Intl","Jeddah"],["CAI","Cairo Intl","Cairo"],
  ["ADD","Addis Ababa Bole Intl","Addis Ababa"],["NBO","Jomo Kenyatta Intl","Nairobi"],
  ["JNB","O.R. Tambo Intl","Johannesburg"],["CPT","Cape Town Intl","Cape Town"],
  ["LOS","Murtala Muhammed Intl","Lagos"],["CMN","Mohammed V Intl","Casablanca"],
  ["DEL","Indira Gandhi Intl","New Delhi"],["BOM","Chhatrapati Shivaji Intl","Mumbai"],
  ["BLR","Kempegowda Intl","Bengaluru"],["MAA","Chennai Intl","Chennai"],
  ["HYD","Rajiv Gandhi Intl","Hyderabad"],["CCU","Netaji Subhas Chandra Bose","Kolkata"],
  ["SIN","Singapore Changi","Singapore"],["KUL","Kuala Lumpur Intl","Kuala Lumpur"],
  ["BKK","Suvarnabhumi Airport","Bangkok"],["CGK","Soekarno-Hatta Intl","Jakarta"],
  ["MNL","Ninoy Aquino Intl","Manila"],["SGN","Tan Son Nhat Intl","Ho Chi Minh City"],
  ["HAN","Noi Bai Intl","Hanoi"],["HKG","Hong Kong Intl","Hong Kong"],
  ["PEK","Beijing Capital Intl","Beijing"],["PVG","Shanghai Pudong Intl","Shanghai"],
  ["ICN","Incheon Intl","Seoul"],["NRT","Narita Intl","Tokyo"],
  ["HND","Haneda Airport","Tokyo"],["SYD","Sydney Airport","Sydney"],
  ["MEL","Melbourne Airport","Melbourne"]
];

var EXTRA=["AAL","AAR","ABJ","ABQ","ABV","ABZ","ACC","ACE","ADB","ADE","ADL","AEP","AES","AGP","AGR","AJA","AKL","ALA","ALB","ALC","ALG","ANK","ANU","AOJ","APW","AQJ","ARH","ASB","ASU","ATQ","AUA","AUS","AXA","BAH","BAK","BAQ","BBU","BBI","BEG","BEY","BFS","BGI","BGO","BGR","BHX","BIA","BIO","BJL","BJM","BKI","BLL","BLQ","BNE","BOD","BOJ","BON","BRE","BRN","BRS","BSB","BSL","BTS","BUE","BUF","CAL","CAN","CAS","CBR","CCJ","CFU","CGH","CGN","CHC","CHQ","CJU","CKG","CLJ","CMB","CMF","CNF","CNX","COK","CRK","CTA","CTG","CTU","CUN","CUR","CUZ","CVG","CWB","DAC","DAL","DAM","DAR","DCF","DKR","DLA","DME","DNK","DPS","DRS","DUS","EBB","EBL","EDI","EIN","EMA","ESB","EVN","FAO","FBU","FIH","FLR","FNA","FNC","FUE","FUK","GBE","GDL","GDN","GEO","GGT","GLA","GOA","GOH","GOT","GRX","GRZ","GUA","GUM","GVA","GYD","GYE","HAJ","HAM","HAV","HBA","HER","HIR","HKT","HOG","HRE","HRK","HSG","IBZ","IEV","IKA","IKT","INN","IOM","ISB","ITO","JAI","JAX","JIB","JNX","JRO","KAN","KBP","KGL","KHH","KHI","KIN","KIX","KJA","KLU","KMG","KRT","KTM","KZN","LAD","LBA","LCA","LCY","LED","LFW","LHE","LJU","LLW","LNZ","LPA","LPB","LUN","LUX","LYS","MAH","MAN","MCT","MDE","MHQ","MKE","MLA","MLE","MMX","MPM","MRS","MRU","MSQ","NAP","NAS","NCE","NIM","NKC","NOU","OAK","ODS","OPO","ORK","ORN","OSA","OTP","OUA","PAP","PBH","PDL","PER","PFO","PHC","PIK","PKX","PLZ","PNH","PNQ","POA","POM","POS","POZ","PPT","PTY","PUJ","PUS","PVR","RAK","RBA","REC","REU","RGN","RIX","RKV","RNO","ROB","ROC","RTM","RUN","SAL","SAP","SAT","SAW","SDJ","SDQ","SDR","SEZ","SHA","SHE","SJC","SJJ","SJO","SJU","SKB","SKG","SKP","SLL","SNA","SOF","SSA","STN","STR","SUB","SVG","SVQ","SXF","SXM","SZX","TAB","TAS","TBS","TER","TGD","TGU","TIA","TIP","TLN","TLS","TMP","TNR","TOS","TPE","TRD","TRN","TRV","TSE","TUN","TXL","UAH","UIO","ULN","URC","VAR","VCE","VKO","VLC","VLI","VNO","VPS","VTE","WLG","WRO","XIY","XMN","YEG","YHZ","YOW","YQB","YWG","YYC","YYJ","ZAG","ZNZ"];

var VALID=new Set(ANSWERS.map(function(a){return a[0];}));
EXTRA.forEach(function(c){VALID.add(c);});

var KB=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['ENTER','Z','X','C','V','B','N','M','⌫']];

var answer,answerInfo,curRow,curCol,tiles,keyEls,keyState,over,playMoreMode,usedIndices;

var stats={played:0,won:0,streak:0};

function getDayIndex(){
  var now=new Date(),m=new Date(now.getFullYear(),now.getMonth(),now.getDate()),e=new Date(2024,0,1);
  return Math.floor((m-e)/86400000);
}
function getSecsUntilMidnight(){
  var now=new Date(),n=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
  return Math.floor((n-now)/1000);
}
function fmt(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return(h<10?'0':'')+h+':'+(m<10?'0':'')+m+':'+(ss<10?'0':'')+ss;}

function pickAnswer(random){
  var idx;
  if(random){
    var available=[];
    for(var i=0;i<ANSWERS.length;i++){if(usedIndices.indexOf(i)===-1)available.push(i);}
    if(!available.length){usedIndices=[];available=ANSWERS.map(function(_,i){return i;});}
    idx=available[Math.floor(Math.random()*available.length)];
    usedIndices.push(idx);
  } else {
    idx=getDayIndex()%ANSWERS.length;
  }
  answerInfo=ANSWERS[idx];
  answer=answerInfo[0];
}

function buildBoard(){
  var b=document.getElementById('board');b.innerHTML='';tiles=[];
  for(var r=0;r<6;r++){
    var row=document.createElement('div');row.className='row';
    var ts=[];
    for(var c=0;c<3;c++){var t=document.createElement('div');t.className='tile';row.appendChild(t);ts.push(t);}
    b.appendChild(row);tiles.push(ts);
  }
}

function buildKeyboard(){
  keyEls={};keyState={};
  KB.forEach(function(row,i){
    var r=document.getElementById('kr'+i);r.innerHTML='';
    row.forEach(function(k){
      var btn=document.createElement('button');
      btn.className='k'+(k.length>1?' wide':'');
      btn.textContent=k;btn.setAttribute('type','button');
      btn.addEventListener('click',function(){handleKey(k);});
      r.appendChild(btn);keyEls[k]=btn;
    });
  });
}

function startGame(random){
  curRow=0;curCol=0;over=false;playMoreMode=!!random;
  document.getElementById('ep').classList.remove('show');
  var t=document.getElementById('toast');t.classList.remove('show');t.textContent='';
  pickAnswer(random);buildBoard();buildKeyboard();
}

function handleKey(k){
  if(over)return;
  if(k==='⌫'||k==='BACKSPACE'){
    if(curCol>0){curCol--;tiles[curRow][curCol].textContent='';tiles[curRow][curCol].classList.remove('filled');}
  } else if(k==='ENTER'){
    submitGuess();
  } else if(/^[A-Z]$/.test(k)&&curCol<3){
    tiles[curRow][curCol].textContent=k;tiles[curRow][curCol].classList.add('filled');curCol++;
  }
}

function submitGuess(){
  if(curCol<3){shakeRow();showToast('Not enough letters');return;}
  var guess=tiles[curRow].map(function(t){return t.textContent;}).join('');
  if(!VALID.has(guess)){shakeRow();showToast('Not a valid IATA code');return;}
  var result=scoreGuess(guess);revealRow(result,guess);
}

function scoreGuess(guess){
  var result=['absent','absent','absent'],a=answer.split(''),g=guess.split(''),used=[false,false,false];
  for(var i=0;i<3;i++){if(g[i]===a[i]){result[i]='correct';used[i]=true;}}
  for(var i=0;i<3;i++){
    if(result[i]==='correct')continue;
    for(var j=0;j<3;j++){if(!used[j]&&g[i]===a[j]){result[i]='present';used[j]=true;break;}}
  }
  return result;
}

function revealRow(result,guess){
  var ts=tiles[curRow];
  ts.forEach(function(t,i){t.classList.remove('filled');t.classList.add('f'+i);setTimeout(function(){t.className='tile '+result[i];},150+i*150);});
  var row=curRow;
  setTimeout(function(){
    updateKeyboard(guess,result);
    var won=result.every(function(r){return r==='correct';});
    if(won){ts.forEach(function(t,i){setTimeout(function(){t.classList.add('bnc');},400+i*100);});setTimeout(function(){endGame(true,row);},1300);}
    else if(row===5){setTimeout(function(){endGame(false,row);},700);}
    else{curRow++;curCol=0;}
  },650);
}

function updateKeyboard(guess,result){
  var pri={correct:3,present:2,absent:1};
  for(var i=0;i<3;i++){
    var k=guess[i];
    if((pri[result[i]]||0)>(pri[keyState[k]]||0)){
      keyState[k]=result[i];var el=keyEls[k];
      if(el){el.classList.remove('sc','sp','sa');el.classList.add(result[i]==='correct'?'sc':result[i]==='present'?'sp':'sa');}
    }
  }
}

function endGame(won,row){
  over=true;stats.played++;
  if(won){stats.won++;stats.streak++;}else{stats.streak=0;}
  document.getElementById('er').textContent=won?['Genius!','Magnificent!','Impressive!','Splendid!','Great!','Phew!'][row]:'Better luck next time!';
  document.getElementById('ec').textContent=answer;
  document.getElementById('ea').textContent=answerInfo[1]+' \u2014 '+answerInfo[2];
  var wp=stats.played?Math.round(stats.won/stats.played*100):0;
  document.getElementById('sr').innerHTML=
    '<div><div class="stn">'+stats.played+'</div><div class="stl">Played</div></div>'+
    '<div><div class="stn">'+wp+'</div><div class="stl">Win %</div></div>'+
    '<div><div class="stn">'+stats.streak+'</div><div class="stl">Streak</div></div>';
  var nlEl=document.getElementById('nl');
  if(!playMoreMode){
    nlEl.textContent='Next daily code in: '+fmt(getSecsUntilMidnight());
    var iv=setInterval(function(){var el=document.getElementById('nl');if(el&&!playMoreMode)el.textContent='Next daily code in: '+fmt(getSecsUntilMidnight());else clearInterval(iv);},1000);
  } else {
    nlEl.textContent='';
  }
  document.getElementById('ep').classList.add('show');
  loadImage(answerInfo[2],answerInfo[1]);
}

function loadImage(city,airportName){
  var il=document.getElementById('il'),ci=document.getElementById('ci'),ic=document.getElementById('ic');
  il.textContent='Loading image...';il.classList.add('show');ci.classList.remove('show');ic.textContent='';
  var wikiTitle=encodeURIComponent(city.replace(/ /g,'_'));
  fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+wikiTitle)
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.thumbnail&&data.thumbnail.source){
        var src=data.thumbnail.source.replace(/\/\d+px-/,'/640px-');
        ci.onload=function(){il.classList.remove('show');ci.classList.add('show');ic.textContent=city+' \u00b7 '+airportName;};
        ci.onerror=function(){tryFallback(city,airportName);};
        ci.src=src;
      } else {tryFallback(city,airportName);}
    }).catch(function(){tryFallback(city,airportName);});
}

function tryFallback(city,airportName){
  var il=document.getElementById('il'),ci=document.getElementById('ci'),ic=document.getElementById('ic');
  var api='https://en.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(city)+'&prop=pageimages&format=json&pithumbsize=640&origin=*';
  fetch(api).then(function(r){return r.json();}).then(function(data){
    var pages=data.query&&data.query.pages;
    if(pages){var page=Object.values(pages)[0];if(page&&page.thumbnail&&page.thumbnail.source){ci.onload=function(){il.classList.remove('show');ci.classList.add('show');ic.textContent=city+' \u00b7 '+airportName;};ci.src=page.thumbnail.source;return;}}
    il.textContent='No image available for '+city;
  }).catch(function(){il.textContent='Could not load image.';});
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},1800);}
function shakeRow(){tiles[curRow].forEach(function(t){t.classList.remove('shake');void t.offsetWidth;t.classList.add('shake');});}

document.addEventListener('keydown',function(e){
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  var k=e.key.toUpperCase();
  if(k==='BACKSPACE')handleKey('BACKSPACE');
  else if(k==='ENTER')handleKey('ENTER');
  else if(/^[A-Z]$/.test(k))handleKey(k);
});

document.getElementById('ng').addEventListener('click',function(){usedIndices=[];startGame(false);});
document.getElementById('pg').addEventListener('click',function(){startGame(true);});

usedIndices=[];
startGame(false);
</script>
